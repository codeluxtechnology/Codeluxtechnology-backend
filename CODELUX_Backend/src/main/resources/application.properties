spring.application.name=CODELUX_Backend

# ===============================
# Server Configuration
# ===============================
server.port=${SERVER_PORT:8080}

# ===============================
# CORS / Frontend Configuration
# ===============================
# Comma-separated frontend URLs allowed to call this backend.
# Example: CORS_ALLOWED_ORIGINS=https://your-frontend-domain.com,http://localhost:5173
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# ===============================
# Database Configuration
# ===============================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/codelux_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===============================
# File Upload
# ===============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

app.upload-dir=${UPLOAD_DIR:assets/uploads}
app.upload-public-path=/uploads

# ===============================
# Admin Security
# ===============================
app.security.admin-token-hours=${ADMIN_TOKEN_HOURS:12}
app.security.admin-token-secret=${ADMIN_TOKEN_SECRET}

# ===============================
# Initial Admin
# ===============================
app.admin.initializer.enabled=${ADMIN_INITIALIZER_ENABLED:true}
app.admin.initializer.email=${ADMIN_INITIALIZER_EMAIL}
app.admin.initializer.username=${ADMIN_INITIALIZER_USERNAME:admin}
app.admin.initializer.full-name=${ADMIN_INITIALIZER_FULL_NAME:Super Admin}
app.admin.initializer.password=${ADMIN_INITIALIZER_PASSWORD}

# ===============================
# Cloudinary
# ===============================
app.cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
app.cloudinary.api-key=${CLOUDINARY_API_KEY}
app.cloudinary.api-secret=${CLOUDINARY_API_SECRET}
app.cloudinary.root-folder=${CLOUDINARY_ROOT_FOLDER:Codelux Technology}
